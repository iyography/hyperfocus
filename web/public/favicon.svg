<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="fm1" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fm2" cx="70%" cy="70%" r="65%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3730a3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fh" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <clipPath id="fc">
      <rect x="2" y="2" width="28" height="28" rx="7"/>
    </clipPath>
  </defs>

  <!-- Base -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="#0f0f1a"/>

  <!-- Mesh -->
  <g clip-path="url(#fc)">
    <rect x="2" y="2" width="28" height="28" fill="url(#fm1)"/>
    <rect x="2" y="2" width="28" height="28" fill="url(#fm2)"/>
  </g>

  <!-- Border -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="none" stroke="#6366f1" stroke-width="0.75" opacity="0.4"/>

  <!-- Simplified H -->
  <rect x="10" y="9" width="2" height="14" rx="1" fill="url(#fh)"/>
  <rect x="20" y="9" width="2" height="14" rx="1" fill="url(#fh)"/>
  <rect x="11" y="15" width="10" height="2" rx="1" fill="url(#fh)"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.2" fill="#f59e0b" opacity="0.7"/>
</svg>